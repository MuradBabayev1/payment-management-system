<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daxil ol – Hottech</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>

  <div class="login-wrapper">
    <div class="login-card">
      <div class="brand">
        <img src="https://hottech.az/wp-content/uploads/2025/01/Asset-1Hottech-logoo-2-300x204.png" alt="Hottech" class="brand-logo-img">
        <p class="brand-sub">Ödəniş İdarəetmə Sistemi</p>
      </div>

      <h2 class="login-title">Xoş gəldiniz</h2>
      <p class="login-desc">Hesabınıza daxil olun</p>

      <div id="error-msg" class="error-box" style="display:none;"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="username">İstifadəçi adı</label>
          <div class="input-wrapper">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            <input type="text" id="username" placeholder="İstifadəçi adınızı daxil edin" autocomplete="username" required>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Şifrə</label>
          <div class="input-wrapper">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="password" placeholder="Şifrənizi daxil edin" autocomplete="current-password" required>
            <button type="button" class="toggle-pass" id="togglePass" title="Şifrəni göstər/gizlət">
              <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-login" id="loginBtn">
          <span id="btnText">Daxil ol</span>
          <span id="btnSpinner" class="spinner" style="display:none;"></span>
        </button>
      </form>
    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
